<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pengajuan - CodaSuaka</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 30px;
        }

        /* ─── Phone Frame ─── */
        .phone-frame {
            width: 393px;
            min-height: 852px;
            background: #F7FAFC;
            border-radius: 44px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* ─── Top Bar ─── */
        .top-bar {
            background: #1A365D;
            color: white;
            padding: 48px 16px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar-back {
            cursor: pointer;
            display: flex;
            align-items: center;
        }

        .top-bar-back svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .top-bar-title {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
        }

        /* ─── Scroll Area ─── */
        .scroll-area {
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: 680px;
            overflow-y: auto;
        }

        .scroll-area::-webkit-scrollbar {
            width: 3px;
        }

        .scroll-area::-webkit-scrollbar-thumb {
            background: #CBD5E0;
            border-radius: 99px;
        }

        /* ─── Card ─── */
        .card {
            background: white;
            border-radius: 16px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding-left: 4px;
        }

        /* ─── Info Header ─── */
        .info-row {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .info-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: #E0F2FE;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-icon svg {
            width: 26px;
            height: 26px;
            fill: #1A365D;
        }

        .info-text h3 {
            font-size: 16px;
            font-weight: 700;
            color: #1A202C;
        }

        .info-text p {
            font-size: 13px;
            color: #718096;
            margin-top: 2px;
            line-height: 1.4;
        }

        /* ─── Form Card ─── */
        .form-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .form-label {
            font-size: 12px;
            font-weight: 600;
            color: #718096;
            margin-bottom: 8px;
        }

        /* ─── Dropdown ─── */
        .dropdown-trigger {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            font-family: inherit;
            font-size: 14px;
            color: #1A202C;
            transition: 0.15s;
        }

        .dropdown-trigger:hover {
            border-color: #1A365D;
        }

        .dropdown-trigger .dropdown-icon-left {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .dropdown-trigger .dropdown-text {
            flex: 1;
            text-align: left;
        }

        .dropdown-trigger .dropdown-arrow {
            width: 20px;
            height: 20px;
            fill: #718096;
            flex-shrink: 0;
        }

        .dropdown-menu {
            margin-top: 4px;
            border: 1px solid #E2E8F0;
            border-radius: 12px;
            background: white;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .dropdown-item {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 14px;
            border: none;
            background: white;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            color: #1A202C;
            transition: 0.1s;
        }

        .dropdown-item:hover {
            background: #F7FAFC;
        }

        .dropdown-item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .dropdown-item-icon svg {
            width: 18px;
            height: 18px;
        }

        .dropdown-item span {
            font-weight: 500;
        }

        /* ─── Date Field ─── */
        .date-field {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            font-family: inherit;
            font-size: 14px;
            color: #1A202C;
            transition: 0.15s;
        }

        .date-field:hover {
            border-color: #1A365D;
        }

        .date-field .date-value {
            flex: 1;
            text-align: left;
        }

        .date-field .date-value.placeholder {
            color: #718096;
        }

        .date-field svg {
            width: 20px;
            height: 20px;
            fill: #1A365D;
            flex-shrink: 0;
        }

        /* ─── Info Hari ─── */
        .hari-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: #1A365D14;
            border-radius: 12px;
        }

        .hari-info svg {
            width: 20px;
            height: 20px;
            fill: #1A365D;
            flex-shrink: 0;
        }

        .hari-info span {
            font-size: 14px;
            font-weight: 600;
            color: #1A365D;
        }

        /* ─── Textarea ─── */
        .textarea-field {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 14px;
            color: #1A202C;
            resize: none;
            outline: none;
            transition: 0.15s;
            min-height: 100px;
            line-height: 1.5;
        }

        .textarea-field:focus {
            border-color: #1A365D;
        }

        .textarea-field::placeholder {
            color: #718096;
        }

        .char-counter {
            font-size: 11px;
            color: #718096;
            text-align: right;
            margin-top: 4px;
        }

        .char-counter.warn {
            color: #E53E3E;
        }

        .char-counter.ok {
            color: #10B981;
        }

        /* ─── Button ─── */
        .btn-submit {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #1A365D;
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
        }

        .btn-submit:hover {
            background: #0F2440;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(26, 54, 93, 0.3);
        }

        .btn-submit svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-submit.loading {
            opacity: 0.7;
            pointer-events: none;
        }

        /* ─── Message ─── */
        .message-card {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
        }

        .message-card.success {
            background: #D1FAE5;
            color: #10B981;
        }

        .message-card.error {
            background: #FFE4E6;
            color: #E53E3E;
        }

        .message-card svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ─── Divider ─── */
        .divider {
            height: 1px;
            background: #E2E8F0;
            margin: 4px 0;
        }

        /* ─── Riwayat Item ─── */
        .riwayat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .riwayat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .riwayat-icon svg {
            width: 22px;
            height: 22px;
        }

        .riwayat-info {
            flex: 1;
            min-width: 0;
        }

        .riwayat-jenis {
            font-size: 14px;
            font-weight: 600;
            color: #1A202C;
        }

        .riwayat-tanggal {
            font-size: 12px;
            color: #718096;
            margin-top: 2px;
        }

        .riwayat-status {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .riwayat-status.disabled {
            background: #D1FAE5;
            color: #10B981;
        }

        .riwayat-status.pending {
            background: #FEF3C7;
            color: #F59E0B;
        }

        .riwayat-status.ditolak {
            background: #FFE4E6;
            color: #F43F5E;
        }

        /* ─── Date Picker Modal ─── */
        .modal-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border-radius: 44px;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            width: 340px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 700;
            color: #1A202C;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .modal-close:hover {
            background: #F1F5F9;
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
            fill: #718096;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .calendar-nav button {
            border: none;
            background: none;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #1A365D;
            font-family: inherit;
        }

        .calendar-nav button:hover {
            background: #E0F2FE;
        }

        .calendar-nav span {
            font-size: 14px;
            font-weight: 600;
            color: #1A202C;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
            margin-bottom: 8px;
        }

        .calendar-header {
            font-size: 11px;
            font-weight: 600;
            color: #718096;
            padding: 6px 0;
        }

        .calendar-day {
            padding: 8px 4px;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            color: #1A202C;
            transition: 0.1s;
        }

        .calendar-day:hover {
            background: #E0F2FE;
        }

        .calendar-day.selected {
            background: #1A365D;
            color: white;
            font-weight: 600;
        }

        .calendar-day.today {
            font-weight: 700;
            border: 1px solid #1A365D;
        }

        .calendar-day.other-month {
            color: #CBD5E0;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 12px;
        }

        .modal-actions button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.1s;
        }

        .modal-actions .btn-cancel {
            background: #F1F5F9;
            color: #718096;
        }

        .modal-actions .btn-cancel:hover {
            background: #E2E8F0;
        }

        .modal-actions .btn-confirm {
            background: #1A365D;
            color: white;
        }

        .modal-actions .btn-confirm:hover {
            background: #0F2440;
        }

        /* ─── Bottom Nav ─── */
        .bottom-nav {
            display: flex;
            background: white;
            padding: 8px 0 12px;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
            border-top: 1px solid #E2E8F0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 0;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            color: #718096;
            transition: 0.15s;
        }

        .nav-item.active {
            color: #1A365D;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        .nav-indicator {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: #1A365D;
            margin-top: 2px;
        }

        /* ─── Loading Spinner ─── */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        // ─── SVG Icons ──────────────────────────────────────────────
        const Icons = {
            ArrowBack: () => <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg>,
            Description: () => <svg viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6z" /></svg>,
            BeachAccess: () => <svg viewBox="0 0 24 24"><path d="M13.127 14.56l1.43-1.43 6.44 6.443L19.57 21zm4.293-5.73l2.86-2.86c-3.95-3.95-10.35-3.96-14.3-.02 3.93-1.3 8.31-.25 11.44 2.88zM5.95 5.98c-3.94 3.95-3.93 10.35.02 14.3l2.86-2.86C5.7 14.29 4.65 9.91 5.95 5.98zm.02-.02l-.01.01c-.38 3.01 1.17 6.88 4.3 10.02l5.73-5.73c-3.13-3.13-7.01-4.68-10.02-4.3z" /></svg>,
            LocalHospital: () => <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 11h-4v4h-4v-4H6v-4h4V6h4v4h4v4z" /></svg>,
            Warning: () => <svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z" /></svg>,
            CalendarMonth: () => <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z" /></svg>,
            DateRange: () => <svg viewBox="0 0 24 24"><path d="M9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm2-7h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11z" /></svg>,
            Send: () => <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" /></svg>,
            CheckCircle: () => <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" /></svg>,
            Error: () => <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z" /></svg>,
            Home: () => <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>,
            Email: () => <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" /></svg>,
            ChevronRight: () => <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" /></svg>,
        };

        const COLORS = {
            teal: '#0D9488', tealLight: '#CCFBF1',
            amber: '#F59E0B', amberLight: '#FEF3C7',
            coral: '#F43F5E', coralLight: '#FFE4E6',
            softBlue: '#E0F2FE',
            primary: '#1A365D',
            scoreGreen: '#10B981', scoreGreenLight: '#D1FAE5',
        };

        // ─── Helpers ──────────────────────────────────────────────
        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        const dayNames = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];

        function formatDate(date) {
            return `${date.getDate()} ${monthNames[date.getMonth()]} ${date.getFullYear()}`;
        }

        function toDateStr(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function getDaysBetween(d1, d2) {
            const ms = d2.getTime() - d1.getTime();
            return Math.floor(ms / (1000 * 60 * 60 * 24)) + 1;
        }

        const JENIS_LIST = [
            { id: 'CUTI_TAHUNAN', label: 'Cuti Tahunan', icon: Icons.BeachAccess, color: COLORS.teal, bg: COLORS.tealLight },
            { id: 'IZIN_SAKIT', label: 'Izin Sakit', icon: Icons.LocalHospital, color: COLORS.amber, bg: COLORS.amberLight },
            { id: 'MENDADAK', label: 'Mendadak', icon: Icons.Warning, color: COLORS.coral, bg: COLORS.coralLight },
        ];

        // ─── Calendar Component ──────────────────────────────────────
        function Calendar({ selectedDate, onSelect, onClose }) {
            const [viewDate, setViewDate] = React.useState(selectedDate || new Date());
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrev = new Date(year, month, 0).getDate();

            const todayStr = toDateStr(new Date());

            const handlePrev = () => setViewDate(new Date(year, month - 1, 1));
            const handleNext = () => setViewDate(new Date(year, month + 1, 1));

            const cells = [];
            for (let i = 0; i < firstDay; i++) {
                const d = daysInPrev - firstDay + i + 1;
                cells.push(<button key={`p${i}`} className="calendar-day other-month" disabled>{d}</button>);
            }
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                const dateStr = toDateStr(date);
                const isSelected = selectedDate && toDateStr(selectedDate) === dateStr;
                const isToday = dateStr === todayStr;
                cells.push(
                    <button
                        key={d}
                        className={`calendar-day${isSelected ? ' selected' : ''}${isToday ? ' today' : ''}`}
                        onClick={() => onSelect(date)}
                    >
                        {d}
                    </button>
                );
            }
            const remaining = 42 - cells.length;
            for (let d = 1; d <= remaining; d++) {
                cells.push(<button key={`n${d}`} className="calendar-day other-month" disabled>{d}</button>);
            }

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e => e.stopPropagation()}>
                        <div className="modal-header">
                            <h3>Pilih Tanggal</h3>
                            <button className="modal-close" onClick={onClose}><Icons.ArrowBack /></button>
                        </div>
                        <div className="calendar-nav">
                            <button onClick={handlePrev}>{'<'} Sebelum</button>
                            <span>{monthNames[month]} {year}</span>
                            <button onClick={handleNext}>Setelah {'>'}</button>
                        </div>
                        <div className="calendar-grid">
                            {dayNames.map(d => <div key={d} className="calendar-header">{d}</div>)}
                            {cells}
                        </div>
                        <div className="modal-actions">
                            <button className="btn-cancel" onClick={onClose}>Batal</button>
                            <button className="btn-confirm" onClick={() => selectedDate && onSelect(selectedDate)}>Pilih</button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── Dummy Data ──────────────────────────────────────────────
        const DUMMY_RIWAYAT = [
            { id: 1, jenis: 'CUTI_TAHUNAN', tglMulai: '12 Juni 2026', tglSelesai: '15 Juni 2026', hari: 4, status: 'disetujui' },
            { id: 2, jenis: 'IZIN_SAKIT', tglMulai: '10 Juni 2026', tglSelesai: '10 Juni 2026', hari: 1, status: 'pending' },
            { id: 3, jenis: 'MENDADAK', tglMulai: '5 Juni 2026', tglSelesai: '5 Juni 2026', hari: 1, status: 'ditolak' },
            { id: 4, jenis: 'CUTI_TAHUNAN', tglMulai: '20 Mei 2026', tglSelesai: '22 Mei 2026', hari: 3, status: 'disetujui' },
            { id: 5, jenis: 'IZIN_SAKIT', tglMulai: '10 Mei 2026', tglSelesai: '12 Mei 2026', hari: 3, status: 'disetujui' },
        ];

        // ═══════════════════════════════════════════════════════════════
        // APP — Pengajuan
        // ═══════════════════════════════════════════════════════════════
        function App() {
            const [selectedJenis, setSelectedJenis] = React.useState(null);
            const [dropdownOpen, setDropdownOpen] = React.useState(false);
            const [tanggalMulai, setTanggalMulai] = React.useState(null);
            const [tanggalSelesai, setTanggalSelesai] = React.useState(null);
            const [keterangan, setKeterangan] = React.useState('');
            const [jumlahHari, setJumlahHari] = React.useState(0);
            const [showPickerMulai, setShowPickerMulai] = React.useState(false);
            const [showPickerSelesai, setShowPickerSelesai] = React.useState(false);
            const [isSaving, setIsSaving] = React.useState(false);
            const [message, setMessage] = React.useState(null); // { type: 'success'|'error', text: '' }
            const [bottomNav, setBottomNav] = React.useState(1);

            const jenisObj = JENIS_LIST.find(j => j.id === selectedJenis);

            const handleSelectJenis = (id) => {
                setSelectedJenis(id);
                setDropdownOpen(false);
                setMessage(null);
            };

            const handleSelectMulai = (date) => {
                setTanggalMulai(date);
                setShowPickerMulai(false);
                setMessage(null);
                if (tanggalSelesai && date <= tanggalSelesai) {
                    setJumlahHari(getDaysBetween(date, tanggalSelesai));
                } else if (tanggalSelesai && date > tanggalSelesai) {
                    setJumlahHari(0);
                }
            };

            const handleSelectSelesai = (date) => {
                setTanggalSelesai(date);
                setShowPickerSelesai(false);
                setMessage(null);
                if (tanggalMulai && date >= tanggalMulai) {
                    setJumlahHari(getDaysBetween(tanggalMulai, date));
                } else if (tanggalMulai && date < tanggalMulai) {
                    setJumlahHari(0);
                }
            };

            const handleKeteranganChange = (e) => {
                setKeterangan(e.target.value);
                setMessage(null);
            };

            const handleSubmit = () => {
                // Validasi
                if (!selectedJenis) { setMessage({ type: 'error', text: 'Pilih jenis pengajuan terlebih dahulu.' }); return; }
                if (!tanggalMulai) { setMessage({ type: 'error', text: 'Pilih tanggal mulai izin.' }); return; }
                if (!tanggalSelesai) { setMessage({ type: 'error', text: 'Pilih tanggal selesai izin.' }); return; }
                if (tanggalSelesai < tanggalMulai) { setMessage({ type: 'error', text: 'Tanggal selesai harus setelah atau sama dengan tanggal mulai.' }); return; }
                if (keterangan.trim().length < 10) { setMessage({ type: 'error', text: 'Alasan minimal 10 karakter.' }); return; }

                setIsSaving(true);
                setMessage(null);

                // Simulasi API
                setTimeout(() => {
                    setIsSaving(false);
                    setMessage({ type: 'success', text: `Pengajuan ${jenisObj.label} berhasil diajukan.` });
                    setSelectedJenis(null);
                    setTanggalMulai(null);
                    setTanggalSelesai(null);
                    setKeterangan('');
                    setJumlahHari(0);
                }, 1200);
            };

            const charCount = keterangan.length;
            const isFormValid = selectedJenis && tanggalMulai && tanggalSelesai && tanggalSelesai >= tanggalMulai && keterangan.trim().length >= 10;

            return (
                <div className="phone-frame">
                    {/* Top Bar */}
                    <div className="top-bar">
                        <div className="top-bar-back"><Icons.ArrowBack /></div>
                        <div className="top-bar-title">Pengajuan</div>
                    </div>

                    <div className="scroll-area">
                        {/* Info Header */}
                        <div className="card" style={{ borderRadius: 16 }}>
                            <div className="info-row">
                                <div className="info-icon"><Icons.Description /></div>
                                <div className="info-text">
                                    <h3>Ajukan Cuti / Izin</h3>
                                    <p>Isi form di bawah untuk mengajukan cuti atau izin.</p>
                                </div>
                            </div>
                        </div>

                        {/* Message */}
                        {message && (
                            <div className={`message-card ${message.type}`}>
                                {message.type === 'success' ? <Icons.CheckCircle /> : <Icons.Error />}
                                <span>{message.text}</span>
                            </div>
                        )}

                        {/* Jenis Pengajuan */}
                        <div className="form-card">
                            <div className="form-label">JENIS PENGAJUAN</div>
                            <div style={{ position: 'relative' }}>
                                <button className="dropdown-trigger" onClick={() => setDropdownOpen(!dropdownOpen)}>
                                    {jenisObj ? (
                                        <>
                                            <span className="dropdown-icon-left" style={{ color: jenisObj.color }}><jenisObj.icon /></span>
                                            <span className="dropdown-text">{jenisObj.label}</span>
                                        </>
                                    ) : (
                                        <>
                                            <Icons.Description />
                                            <span className="dropdown-text" style={{ color: '#718096' }}>Pilih Jenis Pengajuan</span>
                                        </>
                                    )}
                                    <svg className="dropdown-arrow" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z" /></svg>
                                </button>
                                {dropdownOpen && (
                                    <div className="dropdown-menu">
                                        {JENIS_LIST.map(j => (
                                            <button key={j.id} className="dropdown-item" onClick={() => handleSelectJenis(j.id)}>
                                                <div className="dropdown-item-icon" style={{ background: j.bg }}>
                                                    <span style={{ color: j.color, display: 'flex' }}><j.icon /></span>
                                                </div>
                                                <span>{j.label}</span>
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Tanggal Mulai */}
                        <div className="form-card">
                            <div className="form-label">MULAI IZIN</div>
                            <div className="date-field" onClick={() => setShowPickerMulai(true)}>
                                <span className={`date-value${!tanggalMulai ? ' placeholder' : ''}`}>
                                    {tanggalMulai ? formatDate(tanggalMulai) : 'Pilih tanggal mulai'}
                                </span>
                                <Icons.CalendarMonth />
                            </div>
                        </div>

                        {/* Tanggal Selesai */}
                        <div className="form-card">
                            <div className="form-label">SAMPAI IZIN</div>
                            <div className="date-field" onClick={() => setShowPickerSelesai(true)}>
                                <span className={`date-value${!tanggalSelesai ? ' placeholder' : ''}`}>
                                    {tanggalSelesai ? formatDate(tanggalSelesai) : 'Pilih tanggal selesai'}
                                </span>
                                <Icons.CalendarMonth />
                            </div>
                        </div>

                        {/* Jumlah Hari */}
                        {jumlahHari > 0 && (
                            <div className="hari-info">
                                <Icons.DateRange />
                                <span>Total: {jumlahHari} hari</span>
                            </div>
                        )}

                        {/* Keterangan */}
                        <div className="form-card">
                            <div className="form-label">KETERANGAN / ALASAN</div>
                            <textarea
                                className="textarea-field"
                                placeholder="Jelaskan alasan pengajuan cuti/izin Anda..."
                                value={keterangan}
                                onChange={handleKeteranganChange}
                                rows={4}
                            />
                            <div className={`char-counter${keterangan.length > 0 && keterangan.length < 10 ? ' warn' : keterangan.length >= 10 ? ' ok' : ''}`}>
                                {keterangan.length}/10 minimal karakter
                            </div>
                        </div>

                        {/* Submit Button */}
                        <button
                            className={`btn-submit${isSaving ? ' loading' : ''}`}
                            onClick={handleSubmit}
                            disabled={!isFormValid || isSaving}
                        >
                            {isSaving ? (
                                <div className="spinner"></div>
                            ) : (
                                <Icons.Send />
                            )}
                            <span>{isSaving ? 'Mengirim...' : 'Ajukan Pengajuan'}</span>
                        </button>

                        {/* Riwayat */}
                        <div className="divider"></div>
                        <div className="section-label" style={{ marginBottom: 4 }}>RIWAYAT PENGAJUAN</div>
                        {DUMMY_RIWAYAT.slice(0, 5).map(item => {
                            const j = JENIS_LIST.find(j => j.id === item.jenis);
                            let statusClass = 'pending', statusLabel = 'Pending';
                            if (item.status === 'disetujui') { statusClass = 'disabled'; statusLabel = 'Disetujui'; }
                            else if (item.status === 'ditolak') { statusClass = 'ditolak'; statusLabel = 'Ditolak'; }
                            return (
                                <div key={item.id} className="riwayat-item">
                                    <div className="riwayat-icon" style={{ background: j.bg }}>
                                        <span style={{ color: j.color, display: 'flex' }}><j.icon /></span>
                                    </div>
                                    <div className="riwayat-info">
                                        <div className="riwayat-jenis">{j.label}</div>
                                        <div className="riwayat-tanggal">{item.tglMulai} - {item.tglSelesai} ({item.hari} hari)</div>
                                    </div>
                                    <div className={`riwayat-status ${statusClass}`}>{statusLabel}</div>
                                </div>
                            );
                        })}
                        <div style={{ height: 8 }}></div>
                    </div>

                    {/* Bottom Navigation */}
                    <div className="bottom-nav">
                        {[
                            { icon: Icons.Home, label: 'Dashboard', i: 0 },
                            { icon: Icons.Description, label: 'Pengajuan', i: 1 },
                            { icon: Icons.Email, label: 'Pesan', i: 2 },
                        ].map(item => (
                            <button
                                key={item.i}
                                className={`nav-item${bottomNav === item.i ? ' active' : ''}`}
                                onClick={() => setBottomNav(item.i)}
                            >
                                <item.icon />
                                <span>{item.label}</span>
                                {bottomNav === item.i && <div className="nav-indicator"></div>}
                            </button>
                        ))}
                    </div>

                    {/* Date Pickers */}
                    {showPickerMulai && (
                        <Calendar
                            selectedDate={tanggalMulai}
                            onSelect={handleSelectMulai}
                            onClose={() => setShowPickerMulai(false)}
                        />
                    )}
                    {showPickerSelesai && (
                        <Calendar
                            selectedDate={tanggalSelesai}
                            onSelect={handleSelectSelesai}
                            onClose={() => setShowPickerSelesai(false)}
                        />
                    )}
                </div>
            );
        }

        // ─── Render ───────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
