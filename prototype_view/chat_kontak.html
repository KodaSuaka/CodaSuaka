<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat & Kontak</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 30px;
        }

        /* ─── Phone Frame ─── */
        .phone-frame {
            width: 393px;
            min-height: 852px;
            background: #F7FAFC;
            border-radius: 44px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* ─── Top Bar ─── */
        .top-bar {
            background: #1A365D;
            color: white;
            padding: 48px 16px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar-back {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .top-bar-back svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .top-bar-title {
            font-weight: 600;
            font-size: 18px;
            flex: 1;
        }

        .top-bar-actions {
            display: flex;
            gap: 16px;
        }

        .top-bar-actions svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        /* ─── Search Bar ─── */
        .search-bar {
            padding: 12px 16px;
        }

        .search-input {
            width: 100%;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
            background: white;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.15s;
        }

        .search-input:focus {
            border-color: #1A365D;
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
        }

        .search-input::placeholder {
            color: #A0AEC0;
        }

        /* ─── Scroll Area ─── */
        .scroll-area {
            padding: 0 16px 16px;
            display: flex;
            flex-direction: column;
            gap: 0;
            max-height: 620px;
            overflow-y: auto;
        }

        .scroll-area::-webkit-scrollbar {
            width: 3px;
        }

        .scroll-area::-webkit-scrollbar-thumb {
            background: #CBD5E0;
            border-radius: 99px;
        }

        /* ─── Role Section ─── */
        .role-section {
            margin-bottom: 20px;
        }

        .role-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 4px 10px;
            border-bottom: 1px solid #E2E8F0;
            margin-bottom: 4px;
        }

        .role-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .role-icon svg {
            width: 18px;
            height: 18px;
        }

        .role-name {
            font-size: 14px;
            font-weight: 600;
            color: #1A202C;
            flex: 1;
        }

        .role-count {
            font-size: 12px;
            color: #A0AEC0;
            font-weight: 500;
        }

        .role-divider {
            height: 1px;
            background: #E2E8F0;
            margin: 6px 0;
        }

        /* ─── Contact Item ─── */
        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 8px;
            cursor: pointer;
            transition: 0.15s;
            border-radius: 12px;
        }

        .contact-item:hover {
            background: #EDF2F7;
        }

        .contact-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            position: relative;
        }

        .contact-avatar svg {
            width: 24px;
            height: 24px;
            fill: white;
        }

        .contact-info {
            flex: 1;
            min-width: 0;
        }

        .contact-name {
            font-size: 15px;
            font-weight: 600;
            color: #1A202C;
        }

        .contact-preview {
            font-size: 13px;
            color: #A0AEC0;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .contact-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }

        .contact-time {
            font-size: 11px;
            color: #A0AEC0;
        }

        .unread-badge {
            min-width: 20px;
            height: 20px;
            border-radius: 99px;
            background: #F43F5E;
            color: white;
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        .contact-role-badge {
            font-size: 10px;
            color: #718096;
            background: #EDF2F7;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 500;
        }

        /* ─── Self Contact (saya) ─── */
        .contact-item.is-self {
            opacity: 0.7;
            cursor: default;
        }

        .contact-item.is-self:hover {
            background: transparent;
        }

        .self-badge {
            font-size: 10px;
            color: #1A365D;
            background: #E0F2FE;
            padding: 2px 8px;
            border-radius: 99px;
            font-weight: 600;
        }

        /* ═══════════════════════════════════════════════════════════
       CHAT DETAIL SCREEN
    ═══════════════════════════════════════════════════════════ */

        /* ─── Chat Messages Area ─── */
        .chat-area {
            flex: 1;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 560px;
            overflow-y: auto;
            background: #EDF2F7;
        }

        .chat-area::-webkit-scrollbar {
            width: 3px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #CBD5E0;
            border-radius: 99px;
        }

        .chat-date-divider {
            text-align: center;
            font-size: 11px;
            color: #A0AEC0;
            font-weight: 500;
            margin: 8px 0;
        }

        .chat-bubble {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.45;
            position: relative;
        }

        .chat-bubble.sent {
            align-self: flex-end;
            background: #1A365D;
            color: white;
            border-bottom-right-radius: 6px;
        }

        .chat-bubble.received {
            align-self: flex-start;
            background: white;
            color: #1A202C;
            border-bottom-left-radius: 6px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .chat-bubble-time {
            font-size: 10px;
            margin-top: 4px;
            opacity: 0.7;
            text-align: right;
        }

        .chat-bubble.sent .chat-bubble-time {
            color: rgba(255, 255, 255, 0.7);
        }

        .chat-bubble.received .chat-bubble-time {
            color: #A0AEC0;
        }

        .chat-read-status {
            display: inline-flex;
            align-items: center;
            gap: 2px;
            font-size: 10px;
            margin-left: 4px;
        }

        .chat-read-status svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        /* ─── Chat Input ─── */
        .chat-input-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #E2E8F0;
        }

        .chat-input-field {
            flex: 1;
            padding: 10px 16px;
            border-radius: 24px;
            border: 1px solid #E2E8F0;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: 0.15s;
            background: #F7FAFC;
        }

        .chat-input-field:focus {
            border-color: #1A365D;
            box-shadow: 0 0 0 3px rgba(26, 54, 93, 0.1);
            background: white;
        }

        .chat-input-field::placeholder {
            color: #A0AEC0;
        }

        .btn-send {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #1A365D;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            flex-shrink: 0;
        }

        .btn-send:hover {
            background: #2D4A7A;
            transform: scale(1.05);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-send svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        /* ─── Bottom Nav ─── */
        .bottom-nav {
            display: flex;
            background: white;
            padding: 8px 0 12px;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
            border-top: 1px solid #E2E8F0;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 6px 0;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            color: #718096;
            transition: 0.15s;
        }

        .nav-item.active {
            color: #1A365D;
        }

        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .nav-item span {
            font-size: 11px;
            font-weight: 500;
        }

        /* ─── Empty State ─── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            text-align: center;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            fill: #CBD5E0;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 16px;
            color: #1A202C;
            font-weight: 600;
        }

        .empty-state p {
            font-size: 13px;
            color: #A0AEC0;
            margin-top: 4px;
        }

        /* ─── Loading ─── */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #E2E8F0;
            border-top-color: #1A365D;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        // ─── SVG Icons ────────────────────────────────────────────
        const Icons = {
            Home: <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" /></svg>,
            Email: <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" /></svg>,
            Assignment: <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z" /></svg>,
            Groups: <svg viewBox="0 0 24 24"><path d="M16.67 13.13C18.04 14.06 19 15.32 19 17v3h4v-3c0-2.18-3.57-3.47-6.33-3.87z" /><circle cx="9" cy="8" r="4" /><path d="M15 12c2.21 0 4-1.79 4-4s-1.79-4-4-4c-.47 0-.91.1-1.33.24C14.5 5.27 15 6.58 15 8s-.5 2.73-1.33 3.76c.42.14.86.24 1.33.24zm-6 1c-2.67 0-8 1.34-8 4v3h16v-3c0-2.66-5.33-4-8-4z" /></svg>,
            Search: <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" /></svg>,
            Back: <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" /></svg>,
            Send: <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" /></svg>,
            Person: <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>,
            Badge: <svg viewBox="0 0 24 24"><path d="M12 2L15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2z" /></svg>,
            Work: <svg viewBox="0 0 24 24"><path d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-2 .89-2 2v11c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" /></svg>,
            Manager: <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z" /></svg>,
            Staff: <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" /></svg>,
            DoneAll: <svg viewBox="0 0 24 24"><path d="M18 7l-1.41-1.41-6.34 6.34 1.41 1.41L18 7zm4.24-1.41L11.66 16.17 7.48 12l-1.41 1.41L11.66 19l12-12-1.42-1.41zM.41 13.41L6 19l1.41-1.41L1.83 12 .41 13.41z" /></svg>,
            Done: <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" /></svg>,
        };

        // ─── Color palette ────────────────────────────────────────
        const COLORS = {
            pemilik: { bg: '#FEF3C7', icon: '#D97706', label: 'Pemilik' },
            manager: { bg: '#E0F2FE', icon: '#0369A1', label: 'Manager' },
            staff: { bg: '#EDF2F7', icon: '#475569', label: 'Staff' },
        };

        // ─── Mock Data ────────────────────────────────────────────
        const CURRENT_USER_ID = 1;

        const contacts = [
            { id: 1, namaLengkap: 'Andi Pratama', role: 'pemilik', roleLabel: 'Pemilik', email: 'andi@codasuaka.id', lastMessage: 'Oke, nanti saya cek dulu', lastMessageTime: '10:32', unreadCount: 2 },
            { id: 2, namaLengkap: 'Rina Wijaya', role: 'manager', roleLabel: 'Manager', email: 'rina@codasuaka.id', lastMessage: 'Laporan sudah saya kirim', lastMessageTime: '09:15', unreadCount: 0 },
            { id: 3, namaLengkap: 'Bambang S.', role: 'manager', roleLabel: 'Manager', email: 'bambang@codasuaka.id', lastMessage: 'Shift besok gimana?', lastMessageTime: '08:45', unreadCount: 1 },
            { id: 4, namaLengkap: 'Siti Nurhaliza', role: 'staff', roleLabel: 'Staff', email: 'siti@codasuaka.id', lastMessage: 'Sudah masuk pak', lastMessageTime: '07:30', unreadCount: 5 },
            { id: 5, namaLengkap: 'Doni Kusuma', role: 'staff', roleLabel: 'Staff', email: 'doni@codasuaka.id', lastMessage: 'Iya, nanti saya lanjutkan', lastMessageTime: 'Kemarin', unreadCount: 0 },
            { id: 6, namaLengkap: 'Fitri Handayani', role: 'staff', roleLabel: 'Staff', email: 'fitri@codasuaka.id', lastMessage: 'Terima kasih', lastMessageTime: 'Kemarin', unreadCount: 0 },
        ];

        const chatMessages = [
            { id: 1, pengirimId: 2, pesan: 'Halo, laporan bulan ini sudah selesai?', waktu: '08:30' },
            { id: 2, pengirimId: 1, pesan: 'Sudah, sebentar saya kirimkan', waktu: '08:32' },
            { id: 3, pengirimId: 2, pesan: 'Oke, tolong segera ya, ditunggu atas', waktu: '08:33' },
            { id: 4, pengirimId: 1, pesan: 'Baik, ini file nya', waktu: '08:35' },
            { id: 5, pengirimId: 2, pesan: 'Sudah saya terima. Omong-omong, untuk shift besok bagaimana?', waktu: '09:15' },
            { id: 6, pengirimId: 1, pesan: 'Saya masuk shift pagi jam 07.00', waktu: '09:16' },
            { id: 7, pengirimId: 2, pesan: 'Noted. Kalau ada perubahan kabari ya', waktu: '09:17' },
            { id: 8, pengirimId: 1, pesan: 'Siap, akan saya konfirmasi lagi nanti', waktu: '09:18' },
            { id: 9, pengirimId: 2, pesan: 'Oh iya, jangan lupa absen masuk ya', waktu: '09:20' },
            { id: 10, pengirimId: 1, pesan: 'Sudah tadi jam 06.50 kok 😄', waktu: '09:21' },
            { id: 11, pengirimId: 2, pesan: 'Baik, hati-hati di jalan', waktu: '09:22' },
        ];

        // ==========================================================
        // APP
        // ==========================================================
        function App() {
            const [screen, setScreen] = React.useState('contacts'); // 'contacts' | 'chat'
            const [selectedContact, setSelectedContact] = React.useState(null);
            const [inputText, setInputText] = React.useState('');

            function openChat(contact) {
                setSelectedContact(contact);
                setScreen('chat');
            }

            function goBack() {
                setScreen('contacts');
                setSelectedContact(null);
                setInputText('');
            }

            // ─── Group contacts by role ───
            const grouped = React.useMemo(() => {
                const groups = {};
                const roleOrder = ['pemilik', 'manager', 'staff'];
                contacts.forEach(c => {
                    if (!groups[c.role]) groups[c.role] = { role: c.role, label: COLORS[c.role]?.label || c.roleLabel, users: [] };
                    groups[c.role].users.push(c);
                });
                return roleOrder.filter(r => groups[r]).map(r => groups[r]);
            }, []);

            // ─── Contacts Screen ───
            if (screen === 'contacts') {
                return (
                    <div className="phone-frame">
                        {/* Top Bar */}
                        <div className="top-bar">
                            <span className="top-bar-title">Kontak</span>
                            <div className="top-bar-actions">
                                {Icons.Search}
                            </div>
                        </div>

                        {/* Search */}
                        <div className="search-bar">
                            <input className="search-input" type="text" placeholder="Cari kontak..." />
                        </div>

                        {/* Contact List */}
                        <div className="scroll-area">
                            {grouped.map(group => {
                                const color = COLORS[group.role] || { bg: '#EDF2F7', icon: '#475569' };
                                const roleIcon = group.role === 'pemilik' ? Icons.Badge : group.role === 'manager' ? Icons.Manager : Icons.Staff;
                                return (
                                    <div className="role-section" key={group.role}>
                                        {/* Role Header */}
                                        <div className="role-header">
                                            <div className="role-icon" style={{ background: color.bg }}>
                                                <span style={{ color: color.icon, display: 'flex' }}>{roleIcon}</span>
                                            </div>
                                            <span className="role-name">{group.label}</span>
                                            <span className="role-count">{group.users.length} orang</span>
                                        </div>

                                        {/* Contacts */}
                                        {group.users.map(contact => {
                                            const isSelf = contact.id === CURRENT_USER_ID;
                                            return (
                                                <div
                                                    className={`contact-item ${isSelf ? 'is-self' : ''}`}
                                                    key={contact.id}
                                                    onClick={() => !isSelf && openChat(contact)}
                                                >
                                                    {/* Avatar */}
                                                    <div className="contact-avatar" style={{ background: isSelf ? '#A0AEC0' : color.icon }}>
                                                        {Icons.Person}
                                                    </div>

                                                    {/* Info */}
                                                    <div className="contact-info">
                                                        <div className="contact-name">
                                                            {contact.namaLengkap}
                                                            {isSelf && <span className="self-badge" style={{ marginLeft: 6 }}>Anda</span>}
                                                        </div>
                                                        <div className="contact-preview">
                                                            {contact.lastMessage || 'Belum ada obrolan'}
                                                        </div>
                                                    </div>

                                                    {/* Meta */}
                                                    <div className="contact-meta">
                                                        <span className="contact-time">{contact.lastMessageTime}</span>
                                                        {contact.unreadCount > 0 && (
                                                            <span className="unread-badge">{contact.unreadCount}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                );
                            })}
                        </div>

                        {/* Bottom Nav */}
                        <div className="bottom-nav">
                            <div className="nav-item">{Icons.Home}<span>Dashboard</span></div>
                            <div className="nav-item">{Icons.Assignment}<span>Tugas Tim</span></div>
                            <div className="nav-item active">{Icons.Email}<span>Pesan</span></div>
                            <div className="nav-item">{Icons.Groups}<span>Divisi</span></div>
                        </div>
                    </div>
                );
            }

            // ─── Chat Detail Screen ───
            const otherMessages = chatMessages.filter(m => m.pengirimId === selectedContact.id || m.pengirimId === CURRENT_USER_ID);

            function handleSend() {
                if (!inputText.trim()) return;
                // In prototype, just clear input
                setInputText('');
            }

            const roleColor = COLORS[selectedContact?.role] || { bg: '#EDF2F7', icon: '#475569' };

            return (
                <div className="phone-frame" style={{ display: 'flex', flexDirection: 'column' }}>
                    {/* Top Bar with back */}
                    <div className="top-bar">
                        <button className="top-bar-back" onClick={goBack}>{Icons.Back}</button>
                        {/* Avatar mini */}
                        <div className="contact-avatar" style={{ width: 36, height: 36, background: roleColor.icon }}>
                            {Icons.Person}
                        </div>
                        <div style={{ flex: 1 }}>
                            <div className="top-bar-title" style={{ fontSize: 15 }}>{selectedContact?.namaLengkap}</div>
                            <div style={{ fontSize: 11, opacity: 0.8 }}>{selectedContact?.roleLabel}</div>
                        </div>
                        <div className="top-bar-actions">
                            {Icons.Search}
                        </div>
                    </div>

                    {/* Chat Messages */}
                    <div className="chat-area">
                        <div className="chat-date-divider">Hari Ini</div>

                        {otherMessages.map(msg => {
                            const isSent = msg.pengirimId === CURRENT_USER_ID;
                            const showRead = isSent && msg.id === otherMessages[otherMessages.length - 1]?.id;
                            return (
                                <div className={`chat-bubble ${isSent ? 'sent' : 'received'}`} key={msg.id}>
                                    {msg.pesan}
                                    <div className="chat-bubble-time">
                                        {msg.waktu}
                                        {showRead && (
                                            <span className="chat-read-status" title="Sudah dibaca">
                                                {Icons.DoneAll}
                                            </span>
                                        )}
                                        {isSent && !showRead && (
                                            <span className="chat-read-status" title="Terkirim">
                                                {Icons.Done}
                                            </span>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {/* Chat Input */}
                    <div className="chat-input-bar">
                        <input
                            className="chat-input-field"
                            type="text"
                            placeholder="Ketik pesan..."
                            value={inputText}
                            onChange={e => setInputText(e.target.value)}
                            onKeyDown={e => { if (e.key === 'Enter') handleSend(); }}
                        />
                        <button className="btn-send" onClick={handleSend} disabled={!inputText.trim()}>
                            {Icons.Send}
                        </button>
                    </div>
                </div>
            );
        }

        // ─── Render ────────────────────────────────────────────────
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
